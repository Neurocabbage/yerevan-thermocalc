<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор Тепла (Ереван)</title>
    <!-- Подключаем стили Telegram, чтобы приложение выглядело родным -->
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: sans-serif; background: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #000); padding: 15px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 14px; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; }
        button { width: 100%; padding: 12px; background: var(--tg-theme-button-color, #2481cc); color: var(--tg-theme-button-text-color, #fff); border: none; border-radius: 8px; font-size: 16px; margin-top: 15px; cursor: pointer; }
        .result-box { margin-top: 20px; padding: 10px; background: rgba(0,0,0,0.05); border-radius: 8px; font-size: 14px; }
    </style>
</head>
<body>
    <h2>Теплопотери квартиры</h2>
    
    <div class="form-group">
        <label>Внешние стены (м²):</label>
        <input type="number" id="wallOuter" value="35">
    </div>
    <div class="form-group">
        <label>Материал стен:</label>
        <select id="wallMaterial">
            <option value="tuff_40cm">Армянский туф 40 см</option>
            <option value="panel_concrete">Панель без утепления</option>
            <option value="insulated_modern">Современный с утеплением</option>
        </select>
    </div>
    <div class="form-group">
        <label>Площадь окон (м²):</label>
        <input type="number" id="windowsArea" value="8">
    </div>
    <div class="form-group">
        <label>Тип окон:</label>
        <select id="windowsType">
            <option value="double_glazed">Двухкамерный стеклопакет</option>
            <option value="single_old">Старое дерево (1 стекло)</option>
            <option value="energy_efficient">Энергоэффективные</option>
        </select>
    </div>

    <button onclick="runCalculation()">Рассчитать</button>

    <div id="output" class="result-box" style="display:none;"></div>

    <script src="app.js"></script>
</body>
</html>
